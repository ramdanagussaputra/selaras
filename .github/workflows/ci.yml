# Design D8: one workflow, two parallel jobs, no path filters — unconditional
# runs keep branch-protection "required checks" semantics simple, and total
# wall time stays well under the 5-minute budget.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          working-directory: server
      - name: Vet
        run: go vet ./...
      - name: Test (includes dependency-rule test)
        run: go test ./...
      - name: Build
        run: go build ./...

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm run test -- --run
      - name: Build
        run: npm run build

  # Proves the multi-stage build (web assets → Go embed → distroless) stays
  # green between deploys; Render builds its own image on deploy (design D8).
  docker-image:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build production image
        run: docker build -t selaras:${{ github.sha }} .

  # Free-tier migration gate (design D3 as amended): Render auto-deploy is
  # off; migrations run here first, and the Deploy Hook fires only if they
  # succeed — so a failed migration leaves the previous release serving.
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [server, web, docker-image]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run migrations (gates the rollout)
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          docker run --rm -v "$PWD/server/migrations:/migrations" \
            migrate/migrate:v4.19.1 \
            -path=/migrations -database "$DATABASE_URL" up
      - name: Trigger Render deploy
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: curl -fsS -X POST "$DEPLOY_HOOK" -o /dev/null
